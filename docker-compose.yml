# The database now lives in Supabase (managed Postgres) — there is no local DB
# container. The API connects to Supabase using DATABASE_URL from your .env.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env (Supabase connection string)}
      DB_SSL: ${DB_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set in .env (e.g. https://yourclinic.com)}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      REPORT_CRON: ${REPORT_CRON:-0 18 * * *}
      REPORT_EMAIL: ${REPORT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Lying-In Clinic <no-reply@clinic.local>}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${PORT:-5000}:5000"
